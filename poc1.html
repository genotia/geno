<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Genoti POC · Sidebar layout</title>
  <meta name="theme-color" content="#085041" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- default (not black-translucent): keeps the header below the iOS status bar when launched from the home screen -->
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Genoti" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* ── design tokens: copied verbatim from dealhub.html ── */
    :root {
      --green: #1D9E75; --dark-green: #085041; --text: #111827; --muted: #6B7280;
      --border: #E5E7EB; --bg: #F9FAFB; --white: #fff; --red: #EF4444;
      --amber: #B45309; --amber-bg: #FFFBEB; --amber-border: #FDE68A;
      --blue: #1D4ED8; --blue-bg: #EFF6FF; --blue-border: #BFDBFE;
      --purple: #6D28D9; --purple-bg: #F5F3FF; --purple-border: #DDD6FE;
      --coral: #C2410C; --coral-bg: #FFF7ED;
      --green-lt: #ECFDF5; --green-md: #A7F3D0;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); background: var(--bg); line-height: 1.5; }

    /* ── NAV (shared site header) ── */
    nav { position: sticky; top: 0; z-index: 200; background: var(--white); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 24px; }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -.5px; color: var(--text); text-decoration: none; flex-shrink: 0; }
    .nav-links { display: flex; gap: 40px; list-style: none; min-width: 0; overflow: hidden; }
    .nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--muted); transition: color .15s; }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--green); font-weight: 700; }
    .nav-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn-login { font-size: 14px; font-weight: 500; color: var(--text); background: none; border: none; cursor: pointer; padding: 8px 12px; text-decoration: none; transition: color .15s; font-family: inherit; }
    .btn-login:hover { color: var(--green); }
    .btn-pill { display: inline-flex; align-items: center; font-size: 14px; font-weight: 600; color: var(--text); background: var(--white); border: 1.5px solid var(--text); border-radius: 40px; padding: 9px 22px; cursor: pointer; white-space: nowrap; transition: background .15s, color .15s; text-decoration: none; font-family: inherit; }
    .btn-pill:hover { background: var(--text); color: var(--white); }
    .btn-pill-menu { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text); background: var(--white); border: 1.5px solid #D1D5DB; border-radius: 40px; padding: 9px 18px; cursor: pointer; transition: border-color .15s, background .15s; font-family: inherit; }
    .btn-pill-menu:hover { border-color: var(--text); background: var(--bg); }
    .menu-icon { display: flex; flex-direction: column; gap: 4px; }
    .menu-icon span { display: block; width: 16px; height: 1.5px; background: var(--text); border-radius: 2px; }
    .menu-dropdown-wrap { position: relative; display: flex; align-items: center; gap: 8px; }
    .menu-dropdown { display: none; position: absolute; top: calc(100% + 10px); right: 0; width: 280px; background: var(--white); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 16px 48px rgba(0,0,0,.12); z-index: 500; overflow: hidden; padding: 8px 0; }
    .menu-dropdown.open { display: block; }
    .menu-main-item { font-size: 13px; font-weight: 800; color: var(--text); padding: 14px 20px 8px; display: flex; align-items: center; justify-content: space-between; }
    .menu-main-item.clickable { cursor: pointer; transition: background .12s; text-decoration: none; }
    .menu-main-item.clickable:hover { background: var(--bg); }
    .menu-main-arrow { color: var(--muted); }
    .menu-sub-item { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; cursor: pointer; background: none; border: none; width: 100%; text-align: left; font-family: inherit; transition: background .12s; }
    .menu-sub-item:hover { background: var(--bg); }
    .menu-sub-item.highlight { color: var(--green); font-weight: 600; }
    .menu-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .menu-explore { display: none; }   /* product nav lives in the top bar on desktop; shown in the menu on mobile */

    /* ── GENO HERO (accent: --purple) ── */
    .geno-hero { max-width: 1280px; margin: 0 auto; padding: 22px 20px 4px; text-align: center; }
    .geno-hero .eyebrow { display: inline-flex; align-items: center; gap: 6px; background: var(--purple-bg); color: var(--purple); font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; margin-bottom: 12px; }
    .geno-hero h1 { font-size: clamp(22px, 3.2vw, 32px); font-weight: 800; letter-spacing: -.6px; color: var(--text); line-height: 1.12; }
    .geno-hero h1 span { color: var(--purple); }
    .geno-hero p { font-size: 14px; color: var(--muted); margin-top: 8px; }

    /* ── CHAT SHELL ── */
    .geno-wrap { max-width: 1280px; margin: 0 auto; padding: 12px 16px 40px; }
    /* Elastic: grows with content and shrinks back; the page scrolls, not an inner box. */
    .gc-panel { display: flex; flex-direction: column; min-height: clamp(460px, 60vh, 640px); background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,.06); }
    .gc-topbar { display: flex; justify-content: flex-end; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .gc-loc { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--text); }
    .gc-loc > svg { color: var(--text); flex-shrink: 0; }
    .gc-loc-sep { color: var(--muted); }
    .gc-loc-change { background: none; border: none; padding: 0; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--purple); cursor: pointer; }
    .gc-loc-change:hover { text-decoration: underline; }

    .chat { flex: 1 1 auto; padding: 16px 14px; }

    /* messages */
    .msg { margin-bottom: 14px; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
    .msg-user { display: flex; justify-content: flex-end; }
    .msg-user .bubble { max-width: min(82%, 660px); padding: 10px 14px; background: var(--purple); color: #fff; border-radius: 16px 16px 4px 16px; font-size: 14px; line-height: 1.45; }
    .msg-bot { display: flex; align-items: flex-start; gap: 8px; }
    .msg-av { width: 28px; height: 28px; border-radius: 50%; background: var(--purple-bg); color: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 2px; }
    .msg-bot .bubble { max-width: min(86%, 660px); padding: 10px 14px; background: var(--white); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; font-size: 14px; line-height: 1.5; color: var(--text); }
    .msg-cards { margin-left: 36px; margin-top: 8px; }

    .typing { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .typing .dots { padding: 11px 15px; background: var(--white); border: 1px solid var(--border); border-radius: 16px; }
    .typing .dots span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); margin: 0 2px; animation: blink 1.4s infinite; }
    .typing .dots span:nth-child(2) { animation-delay: .2s; }
    .typing .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,100% { opacity: .3;} 50% { opacity: 1;} }

    /* ── DIGEST ── */
    .digest { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .digest-head { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
    .digest-head b { color: var(--purple); }
    .digest-sub { font-size: 11.5px; color: var(--muted); margin-bottom: 12px; }
    /* Digest breakdown as visual cards, one per deal type, tinted with the type accent */
    .dg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
    .dg-card { text-align: left; font-family: inherit; cursor: pointer; background: var(--dg-bg); border: 1.5px solid transparent; border-radius: 12px; padding: 11px 12px; display: flex; flex-direction: column; gap: 7px; transition: transform .15s, box-shadow .15s, border-color .15s; }
    .dg-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.09); border-color: var(--dg-fg); }
    .dg-top { display: flex; align-items: baseline; gap: 6px; }
    .dg-n { font-size: 23px; font-weight: 800; color: var(--dg-fg); line-height: 1; }
    .dg-type { font-size: 11.5px; font-weight: 700; color: var(--dg-fg); }
    .dg-best { border-top: 1px solid rgba(0,0,0,.07); padding-top: 7px; }
    .dg-merchant { font-size: 12.5px; font-weight: 700; color: var(--text); }
    .dg-offer { font-size: 11px; color: var(--muted); line-height: 1.35; margin-top: 1px; }
    .dg-foot { font-size: 10.5px; font-weight: 700; color: var(--dg-fg); opacity: .85; }
    @media (max-width: 480px) { .dg-grid { grid-template-columns: 1fr 1fr; } }

    /* My bookings */
    .bk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(215px, 1fr)); gap: 10px; }
    .bk-card { background: var(--green-lt, #ECFDF5); border: 1.5px solid var(--green-md, #A7F3D0); border-radius: 14px; padding: 13px 14px; display: flex; flex-direction: column; gap: 6px; }
    .bk-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .bk-merchant { font-size: 13.5px; font-weight: 800; color: var(--text); letter-spacing: -.2px; overflow-wrap: anywhere; }
    .bk-kind { flex-shrink: 0; font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; padding: 3px 7px; border-radius: 20px; background: var(--white); color: var(--green); border: 1px solid var(--green-md, #A7F3D0); }
    .bk-offer { font-size: 12.5px; color: var(--text); line-height: 1.45; }
    .bk-meta { font-size: 11.5px; color: var(--muted); }
    .bk-code { font-size: 12px; font-weight: 800; letter-spacing: 1.2px; color: var(--dark-green); background: var(--white); border: 1px dashed var(--green); border-radius: 8px; padding: 5px 8px; text-align: center; }
    .bk-pay { font-size: 12px; font-weight: 700; color: var(--dark-green); }
    .bk-cancel { align-self: flex-start; margin-top: 2px; background: none; border: none; padding: 0; font-family: inherit; font-size: 11.5px; font-weight: 700; color: var(--muted); cursor: pointer; text-decoration: underline; }
    .bk-cancel:hover { color: var(--red, #EF4444); }
    @media (max-width: 480px) { .bk-grid { grid-template-columns: 1fr; } }

    /* Nearby malls as cards */
    .ml-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
    .ml-card { text-align: left; font-family: inherit; cursor: pointer; background: var(--white); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 9px; transition: transform .15s, box-shadow .15s, border-color .15s; }
    .ml-card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.09); border-color: var(--purple); }
    .ml-top { display: flex; align-items: center; gap: 9px; }
    .ml-ico { width: 32px; height: 32px; border-radius: 9px; background: var(--purple-bg); color: var(--purple); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .ml-id { flex: 1; min-width: 0; }
    .ml-name { font-size: 13px; font-weight: 800; color: var(--text); line-height: 1.2; overflow-wrap: anywhere; }
    .ml-area { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
    .ml-km { font-size: 11px; font-weight: 700; color: var(--purple); background: var(--purple-bg); padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .ml-statrow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .ml-stats { border-top: 1px solid var(--border); padding-top: 8px; }
    .ml-n { font-size: 19px; font-weight: 800; color: var(--purple); }
    .ml-lbl { font-size: 11px; font-weight: 600; color: var(--muted); }
    .ml-split { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
    @media (max-width: 480px) { .ml-grid { grid-template-columns: 1fr; } }

    /* Previous turns are tucked away so a new result set starts at the top */
    .gc-past { display: none !important; }
    .gc-earlier { display: none; margin: 0 auto 12px; background: var(--bg); border: 1px solid var(--border);
                  color: var(--muted); font-family: inherit; font-size: 11.5px; font-weight: 700;
                  padding: 5px 13px; border-radius: 20px; cursor: pointer; transition: all .15s; }
    .gc-earlier:hover { border-color: var(--purple); color: var(--purple); }

    .digest-line { display: flex; gap: 10px; padding: 9px 0; border-top: 1px solid var(--border); cursor: pointer; }
    .digest-line:hover .dl-name { color: var(--purple); }
    .dl-dot { width: 8px; height: 8px; border-radius: 3px; flex-shrink: 0; margin-top: 5px; }
    .dl-body { flex: 1; min-width: 0; }
    .dl-title { font-size: 12.5px; font-weight: 700; color: var(--text); }
    .dl-title .dl-count { color: var(--muted); font-weight: 600; }
    .dl-eg { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .dl-eg .dl-name { color: var(--text); font-weight: 600; }
    .dl-arrow { color: var(--muted); align-self: center; flex-shrink: 0; }

    /* ── CHIPS ── */
    .chips { display: flex; gap: 7px; flex-wrap: wrap; margin: 8px 0 2px; }
    .chip { padding: 7px 13px; background: var(--white); border: 1.5px solid var(--border); border-radius: 20px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--text); transition: all .15s; font-family: inherit; }
    .chip:hover { border-color: var(--purple); color: var(--purple); }
    .chips-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 2px; }

    /* ── AREA PICKER ── */
    .area-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .area-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
    .area-sub { font-size: 11.5px; color: var(--muted); margin-bottom: 10px; }

    /* ── DEAL CARDS ── */
    .deal-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 4px; }
    @media (max-width: 1240px) { .deal-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 1000px) { .deal-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 760px)  { .deal-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 520px)  { .deal-grid { grid-template-columns: 1fr; } }
    .deal-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 13px; box-shadow: 0 2px 10px rgba(0,0,0,.05); transition: box-shadow .15s, transform .15s; display: flex; flex-direction: column; }
    .deal-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.09); transform: translateY(-2px); }
    .dc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
    .dc-name { font-size: 14px; font-weight: 700; color: var(--text); }
    .dc-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .dc-tag { font-size: 9.5px; font-weight: 700; padding: 3px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
    .dc-offer { font-size: 13px; font-weight: 600; color: var(--purple); margin-bottom: 6px; }
    .dc-price { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; margin-bottom: 5px; }
    .dc-real { font-size: 17px; font-weight: 800; color: var(--green); }
    .dc-ref { font-size: 12px; color: var(--muted); text-decoration: line-through; }
    .dc-window { font-size: 11px; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .dc-countdown { color: var(--coral); font-weight: 700; }
    .dc-trust { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; padding: 4px 8px; border-radius: 8px; margin-bottom: 8px; width: fit-content; }
    .dc-trust svg { flex-shrink: 0; }
    .dc-trust.merchant { background: var(--green-lt); color: var(--dark-green); }
    .dc-trust.community { background: var(--blue-bg); color: var(--blue); }
    .dc-trust.checked { background: var(--amber-bg); color: var(--amber); }
    .dc-tip { font-size: 11px; color: var(--blue); background: var(--blue-bg); border-radius: 8px; padding: 6px 9px; margin-bottom: 8px; }
    .dc-actions { display: flex; align-items: center; gap: 6px; margin-top: auto; }
    .dc-book { flex: 1; padding: 9px 0; background: var(--purple); color: #fff; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .dc-book:hover { opacity: .9; }
    .dc-icon { width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 10px; background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .dc-icon:hover { border-color: var(--purple); }
    .dc-icon.voted { background: var(--purple-bg); border-color: var(--purple); }

    /* ── PAGINATION (25 per page) ── */
    .pager-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .pager-btn { padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 20px; background: var(--white); font-size: 12.5px; font-weight: 600; color: var(--text); cursor: pointer; font-family: inherit; transition: all .15s; }
    .pager-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple); }
    .pager-btn:disabled { opacity: .4; cursor: not-allowed; }
    .pager-info { font-size: 11.5px; color: var(--muted); font-weight: 600; }

    /* ── EMPTY STATE ── */
    .empty-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .empty-actions { display: flex; flex-direction: column; gap: 7px; }
    .empty-btn { text-align: left; padding: 11px 13px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 9px; transition: all .15s; }
    .empty-btn:hover { border-color: var(--purple); background: var(--purple-bg); }
    .empty-btn .eb-ic { font-size: 15px; }
    .empty-btn.primary { background: var(--purple); color: #fff; border-color: var(--purple); }
    .empty-btn.primary:hover { opacity: .92; background: var(--purple); }

    /* ── NEGOTIATE / CONFIRM CARDS ── */
    .info-card { background: var(--purple-bg); border: 1px solid var(--purple-border); border-radius: 14px; padding: 14px; margin-bottom: 8px; }
    .info-title { font-size: 13.5px; font-weight: 700; color: var(--purple); margin-bottom: 6px; }
    .info-prices { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .info-old { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .info-new { font-size: 22px; font-weight: 800; color: var(--green); }
    .info-pct { background: rgba(29,158,117,.14); color: var(--green); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .info-note { font-size: 11px; color: var(--muted); }
    .info-btn { width: 100%; padding: 10px; background: var(--purple); color: #fff; border: none; border-radius: 10px; font-size: 12.5px; font-weight: 700; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .confirm-card { background: var(--green-lt); border: 2px solid var(--green); border-radius: 14px; padding: 15px; text-align: center; margin-bottom: 8px; }
    .confirm-icon { font-size: 26px; }
    .confirm-title { font-size: 15px; font-weight: 800; color: var(--dark-green); margin-top: 3px; }
    .confirm-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .confirm-pay { display: inline-block; margin-top: 8px; padding: 6px 15px; background: var(--dark-green); color: #fff; border-radius: 8px; font-size: 12px; font-weight: 700; }
    .confirm-code { font-size: 19px; font-weight: 800; letter-spacing: 1.5px; color: var(--purple); margin-top: 6px; }

    /* ── AI NEGOTIATE (live transcript) ── */
    .neg-panel { border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 8px; background: var(--white); }
    .neg-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--purple-bg); border-bottom: 1px solid var(--purple-border); font-size: 12.5px; font-weight: 700; color: var(--purple); }
    .neg-live { display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700; color: var(--green); }
    .neg-live .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.2s infinite; }
    .neg-head.done .neg-live { color: var(--muted); }
    .neg-head.done .neg-live .dot { background: var(--muted); animation: none; }
    .neg-head-name { margin-left: auto; color: var(--muted); font-weight: 600; font-size: 11px; }
    .neg-log { padding: 12px 14px; display: flex; flex-direction: column; gap: 9px; }
    .neg-sys { align-self: center; text-align: center; font-size: 10.5px; font-weight: 600; color: var(--muted); background: var(--bg); border: 1px solid var(--border); padding: 3px 11px; border-radius: 20px; }
    .neg-row { display: flex; gap: 7px; max-width: 90%; }
    .neg-row.bot { align-self: flex-end; flex-direction: row-reverse; }
    .neg-row.mer { align-self: flex-start; }
    .neg-av { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .neg-av.bot { background: var(--purple-bg); }
    .neg-av.mer { background: var(--bg); border: 1px solid var(--border); }
    .neg-lbl { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
    .neg-row.bot .neg-lbl { text-align: right; }
    .neg-bubble { font-size: 12.5px; line-height: 1.45; padding: 8px 11px; border-radius: 12px; }
    .neg-row.bot .neg-bubble { background: var(--purple); color: #fff; border-bottom-right-radius: 4px; }
    .neg-row.mer .neg-bubble { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .neg-typing { display: inline-flex; gap: 3px; padding: 10px 11px; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; }
    .neg-typing span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: blink 1.4s infinite; }
    .neg-typing span:nth-child(2) { animation-delay: .2s; }
    .neg-typing span:nth-child(3) { animation-delay: .4s; }
    .neg-result { border: 1.5px solid var(--purple); border-radius: 14px; padding: 14px; background: var(--purple-bg); margin-bottom: 8px; }
    .neg-result-title { font-size: 12.5px; font-weight: 700; color: var(--purple); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .neg-prices { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .neg-new { font-size: 23px; font-weight: 800; color: var(--green); }
    .neg-was { font-size: 13px; color: var(--muted); text-decoration: line-through; }
    .neg-pct { background: rgba(29,158,117,.14); color: var(--green); font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .neg-expiry { font-size: 11.5px; color: var(--coral); font-weight: 700; margin-bottom: 11px; }
    .neg-accept { width: 100%; padding: 11px; background: var(--purple); color: #fff; border: none; border-radius: 10px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .neg-accept:hover { opacity: .92; }
    .neg-target { display: flex; gap: 7px; flex-wrap: wrap; }

    /* ── QUICK SELECT ── */
    .qs-row { display: flex; gap: 7px; overflow-x: auto; padding: 10px 12px; border-top: 1px solid var(--border); flex-shrink: 0; -webkit-overflow-scrolling: touch; }
    .qs-row::-webkit-scrollbar { display: none; }
    .qs-btn { padding: 8px 13px; background: var(--white); border: 1.5px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 600; color: var(--text); cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: inherit; transition: all .15s; }
    .qs-btn:hover { border-color: var(--purple); color: var(--purple); }

    /* ── INPUT ── */
    /* The composer is a floating pill, deliberately unlike the cards and panels
       around it, and capped so it does not stretch across the whole width. */
    .input-bar { padding: 14px 16px 18px; background: var(--white); border-top: 1px solid var(--border); flex-shrink: 0; display: flex; justify-content: center; }
    .composer { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 620px; background: var(--white); border: 1.5px solid #DDD6FE; border-radius: 999px; padding: 5px 6px 5px 17px; box-shadow: 0 6px 22px rgba(109,40,217,.12); transition: border-color .15s, box-shadow .15s; }
    .composer:focus-within { border-color: var(--purple); box-shadow: 0 8px 28px rgba(109,40,217,.22); }
    .composer-ico { color: var(--purple); display: flex; flex-shrink: 0; }
    .composer input { flex: 1; min-width: 0; border: none; background: transparent; outline: none; font-size: 14.5px; font-family: inherit; color: var(--text); padding: 12px 0; }
    .composer input::placeholder { color: var(--muted); }
    /* The send button is the one saturated, animated control on the page, so it
       reads as an action rather than another card in the deals list. */
    .send-btn { position: relative; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #7C3AED 0%, #5B21B6 100%); border: none; color: #fff; cursor: pointer; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(109,40,217,.42), 0 0 0 4px rgba(109,40,217,.10); transition: transform .14s, box-shadow .2s; }
    .send-btn::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid rgba(109,40,217,.45); opacity: 0; animation: sendPulse 2.6s ease-out infinite; pointer-events: none; }
    @keyframes sendPulse { 0% { transform: scale(.9); opacity: .7; } 70% { transform: scale(1.32); opacity: 0; } 100% { opacity: 0; } }
    .send-btn:hover { transform: scale(1.06); box-shadow: 0 8px 24px rgba(109,40,217,.52), 0 0 0 6px rgba(109,40,217,.13); }
    .send-btn:active { transform: scale(.95); }
    /* Once the field has focus the nudge has done its job. */
    .composer:focus-within .send-btn::after { animation: none; }
    .send-btn svg { flex-shrink: 0; }
    @media (prefers-reduced-motion: reduce) { .send-btn::after { animation: none; } }

    /* Floating reminder: this is an AI chatbot — jump to the composer */
    .geno-fab { position: fixed; right: 20px; bottom: 22px; z-index: 250; display: none; align-items: center; gap: 8px; padding: 12px 18px; border-radius: 40px; background: var(--purple); color: #fff; border: none; cursor: pointer; font-family: inherit; font-size: 13.5px; font-weight: 700; box-shadow: 0 10px 26px rgba(109,40,217,.42); animation: fabBob 2.2s ease-in-out infinite; }
    .geno-fab.show { display: inline-flex; }
    .geno-fab .fab-ico { font-size: 15px; }
    @keyframes fabBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @media (max-width: 768px) { .geno-fab { right: 14px; bottom: calc(66px + env(safe-area-inset-bottom)); } }

    /* ── FOOTER (shared) ── */
    footer { background: #111827; color: rgba(255,255,255,.6); padding: 44px 24px 28px; margin-top: 60px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 36px; margin-bottom: 36px; }
    .f-logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -.5px; display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .f-tagline { font-size: 13px; line-height: 1.6; max-width: 260px; }
    .footer-col h4 { font-size: 13px; font-weight: 700; color: white; margin-bottom: 12px; }
    .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .footer-col ul a { text-decoration: none; font-size: 13px; color: rgba(255,255,255,.55); transition: color .15s; display: flex; align-items: center; gap: 7px; }
    .footer-col ul a:hover { color: white; }
    .footer-col ul a svg { flex-shrink: 0; opacity: .8; }
    .footer-col ul li.parent-link a { color: #4ade80; font-weight: 700; }
    .footer-col ul li.child { padding-left: 12px; }
    .footer-col ul li.child a { font-size: 12px; color: rgba(255,255,255,.4); }
    .footer-col ul li.child a svg { width: 12px; height: 12px; }
    .footer-bottom { border-top: 1px solid rgba(255,255,255,.1); padding-top: 20px; font-size: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; max-width: 1200px; margin: 0 auto; }
    .footer-bottom a { color: rgba(255,255,255,.5); text-decoration: none; }

    /* ── MOBILE TAB BAR (chrome) ── */
    .mtb { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; background: #fff; border-top: 1.5px solid #E5E7EB; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -2px 12px rgba(0,0,0,.08); }
    .mtb-row { display: flex; justify-content: space-around; align-items: center; height: 56px; }
    .mtb-a { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; flex: 1; text-decoration: none; padding: 6px 4px; color: #6B7280; -webkit-tap-highlight-color: transparent; }
    .mtb-i { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }
    .mtb-i svg { width: 22px; height: 22px; }
    .mtb-t { font-size: 10px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    .mtb-a.on { color: #1D9E75; }
    .mtb-a.on .mtb-i svg { transform: scale(1.1); }
    /* Featured center tab: Geno AI, raised and larger than the others */
    .mtb-a.mtb-geno { justify-content: flex-end; }
    .mtb-a.mtb-geno .mtb-i { width: 54px; height: 54px; border-radius: 50%; background: var(--purple); color: #fff; margin-top: -26px; border: 4px solid #fff; box-shadow: 0 6px 16px rgba(109,40,217,.42); }
    .mtb-a.mtb-geno .mtb-i svg { width: 26px; height: 26px; transform: none; }
    .mtb-a.mtb-geno .mtb-t { color: var(--purple); font-weight: 800; margin-top: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { #nav-list-biz { display: none; } }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-right .btn-login, .nav-right .btn-pill { display: none; }
      .nav-inner { padding: 0 16px; }
      .menu-explore { display: block; }                                    /* surface product nav in the mobile menu */
      .menu-dropdown { max-height: 78vh; overflow-y: auto; }               /* keep a long menu scrollable, not clipped */
      .footer-inner { grid-template-columns: 1fr 1fr; }
      .geno-hero { padding: 18px 16px 4px; }
      .geno-wrap { padding: 10px 12px 30px; }
      .mtb { display: block; }
      body { padding-bottom: calc(56px + env(safe-area-inset-bottom)); }
    }
    @media (max-width: 480px) { .footer-inner { grid-template-columns: 1fr; } }

    /* ── POC sidebar shell (pc- prefixed so nothing collides with Geno) ── */
    .pc-app { display: flex; min-height: 100vh; }
    .pc-sidebar { width: 250px; flex-shrink: 0; background: #111827; color: #fff; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
    .pc-brand { display: flex; align-items: center; gap: 9px; padding: 20px 20px 16px; }
    .pc-brand-mark { width: 28px; height: 28px; border-radius: 8px; background: var(--purple); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #fff; }
    .pc-brand-name { font-weight: 800; font-size: 17px; letter-spacing: -.3px; }
    .pc-loc { display: flex; align-items: center; gap: 6px; margin: 0 16px 12px; padding: 8px 10px; width: calc(100% - 32px); background: rgba(255,255,255,.06); border: none; border-radius: 9px; font-size: 12.5px; color: #c9c8d4; font-family: inherit; cursor: pointer; text-align: left; }
    .pc-loc svg { flex-shrink: 0; }
    .pc-loc:hover { background: rgba(255,255,255,.1); color: #fff; }
    .pc-nav { flex: 1; padding: 6px 12px; overflow-y: auto; }
    .pc-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #6f6e7e; padding: 14px 8px 6px; font-weight: 700; }
    .pc-item { display: flex; align-items: center; gap: 11px; width: 100%; background: none; border: none; color: #c9c8d4; padding: 9px 10px; border-radius: 9px; font-size: 14px; text-align: left; font-family: inherit; cursor: pointer; transition: background .12s, color .12s; }
    .pc-item svg { width: 18px; height: 18px; flex-shrink: 0; }
    .pc-item:hover { background: rgba(255,255,255,.07); color: #fff; }
    .pc-item.active { background: var(--purple); color: #fff; font-weight: 600; }
    .pc-foot { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,.08); }
    .pc-login { display: inline-block; color: #c9c8d4; font-size: 13px; font-weight: 600; }
    .pc-login:hover { color: #fff; }
    .pc-main { flex: 1; min-width: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    /* Header */
    .pc-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 30px; border-bottom: 1px solid var(--border); background: var(--white); }
    .pc-h-eyebrow { font-size: 11px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; color: var(--purple); }
    .pc-h-name { font-size: 18px; font-weight: 800; letter-spacing: -.4px; color: var(--text); margin-top: 1px; }
    .pc-h-loc { display: inline-flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 7px 13px; font-size: 12.5px; font-weight: 600; color: var(--text); font-family: inherit; cursor: pointer; white-space: nowrap; }
    .pc-h-loc:hover { border-color: var(--purple); color: var(--purple); }
    .pc-h-loc svg { color: var(--purple); flex-shrink: 0; }
    /* Body fills the window; the chat panel fills the body (app feel, not a small card) */
    .pc-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .pc-body .geno-wrap { max-width: 1180px; width: 100%; margin: 0 auto; padding: 18px 30px; display: flex; }
    .pc-main .gc-panel { flex: 1; min-height: 0; width: 100%; }
    .pc-main .gc-topbar { display: none; }   /* location lives in the header now */
    .pc-main .qs-row { display: none; }       /* the sidebar replaces the in-panel quick chips */
    /* Footer */
    .pc-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; padding: 11px 30px; border-top: 1px solid var(--border); background: var(--white); font-size: 12px; color: var(--muted); }
    .pc-footer a { color: var(--muted); font-weight: 600; }
    .pc-footer a:hover { color: var(--purple); }
    .pc-foot-links { display: flex; gap: 16px; flex-wrap: wrap; }
    /* Account button (sidebar foot) */
    .pc-account { display: flex; align-items: center; gap: 10px; width: 100%; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 11px; padding: 8px 10px; color: #fff; font-family: inherit; cursor: pointer; text-align: left; transition: background .12s; }
    .pc-account:hover { background: rgba(255,255,255,.09); }
    .pc-av { width: 32px; height: 32px; border-radius: 50%; background: var(--purple); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .pc-account-txt { min-width: 0; flex: 1; }
    .pc-account-txt b { display: block; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-account-txt small { display: block; font-size: 11px; color: #8a8998; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pc-logout { flex-shrink: 0; display: flex; align-items: center; color: #8a8998; padding: 3px; border-radius: 6px; }
    .pc-logout:hover { color: #fff; background: rgba(255,255,255,.08); }
    @media (max-width: 900px) {
      .pc-app { flex-direction: column; }
      .pc-sidebar { width: 100%; height: auto; position: sticky; top: 0; z-index: 200; flex-direction: row; align-items: center; overflow-x: auto; }
      .pc-loc, .pc-label, .pc-foot { display: none; }
      .pc-brand { padding: 12px 14px; }
      .pc-nav { display: flex; padding: 8px; gap: 4px; }
      .pc-item { white-space: nowrap; width: auto; padding: 8px 12px; }
      .pc-main { height: auto; overflow: visible; }
      .pc-header { padding: 12px 16px; }
      .pc-h-name { font-size: 16px; }
      .pc-body { display: block; overflow: visible; }
      .pc-body .geno-wrap { display: block; padding: 14px 16px; }
      .pc-main .gc-panel { min-height: clamp(460px, 70vh, 640px); }
      .pc-footer { padding: 12px 16px; flex-direction: column; align-items: flex-start; gap: 6px; }
    }
  </style>
</head>

/* ============================================================

/* ---------- Header menu (chrome) ---------- */

document.addEventListener('click', e => { if (!e.target.closest('.menu-dropdown-wrap')) document.getElementById('menu-dropdown').classList.remove('open'); });

/* ============================================================ DATA LAYER (stub) ============================================================ */
const NOW = Date.now();
const AREAS = ['Koramangala','Indiranagar','HSR Layout','JP Nagar','Jayanagar','BTM Layout','Whitefield','Marathahalli'];

const TYPE_META = {

// Every deal is real inventory. Trust marker required on each.

const MALLS = [

const _DB = [

  { id:'d08', merchant:'Third Wave', mall:'garuda',      cat:'Cafe',       area:'Koramangala', km:1.1, offer:'15% off cold brews',          real:213,  ref:250,  type:'community',   window:'Today',          expMin:null, bogo:false, buffet:false, createdMin:58, trust:{kind:'community', votes:3},                tip:null },
  { id:'d09', merchant:'Cult.fit',        cat:'Fitness',    area:'Koramangala', km:1.5, offer:'Free trial week',             real:0,    ref:499,  type:'new-launch',  window:'This week',      expMin:null, bogo:false, buffet:false, createdMin:65, trust:{kind:'merchant'},                          tip:null },

  { id:'d12', merchant:'Truffles', mall:'forum',        cat:'Restaurant', area:'Koramangala', km:1.8, offer:'Weekend buffet',              real:449,  ref:799,  type:'last-minute', window:'Sat-Sun',        expMin:null, bogo:false, buffet:true,  createdMin:45, trust:{kind:'merchant'},                          tip:null },

  { id:'d14', merchant:'Nails & Co', mall:'phoenix',      cat:'Salon',      area:'Koramangala', km:1.6, offer:'Nail art + pedicure',         real:649,  ref:999,  type:'community',   window:'Today',          expMin:null, bogo:false, buffet:false, createdMin:18, trust:{kind:'community', votes:21},               tip:null },
];

// Extra live inventory so a broad query spans multiple 25-per-page pages.
// Same shape + a trust marker on every one; roughly a third carry no ref (real price alone).
(function seedInventory(){
  const cats = ['Salon','Restaurant','Cafe','Fitness','Wellness'];
  const types = ['off-peak','last-minute','community','flash','new-launch'];
  const trusts = [{kind:'merchant'}, {kind:'community', votes:8}, {kind:'checked', cmp:'22% below area avg'}];
  for (let i = 0; i < 24; i++){
    const cat = cats[i % 5], type = types[i % 5];
    const real = 200 + ((i * 53) % 1400);
    const hasRef = (i % 3 !== 0);
    const ref = hasRef ? Math.round(real / (1 - (0.15 + (i % 4) * 0.05))) : null;
    _DB.push({
      id: 'g' + (i + 1), merchant: cat + ' House ' + (i + 1), cat: cat, area: 'Koramangala',
      km: +(0.5 + (i % 16) * 0.1).toFixed(1),
      offer: hasRef ? (Math.round((1 - real / ref) * 100) + '% off') : 'Special price',
      real: real, ref: ref, type: type, window: 'Today', expMin: (i % 4 === 0) ? (25 + i) : null,
      bogo: false, buffet: false, createdMin: (i * 11) % 180, trust: trusts[i % 3], tip: null
    });
  }
})();

/* SINGLE data-access seam. Swap the body for a fetch() to go live. */
function fetchDeals(f) {
  f = f || {};
  return _DB.filter(d => {
    if (f.mall && d.mall !== f.mall) return false;
    if (f.area && !f.mall && d.area !== f.area) return false;
    if (f.category && d.cat.toLowerCase() !== f.category.toLowerCase()) return false;
    if (f.type && d.type !== f.type) return false;
    if (f.bogo && !d.bogo) return false;
    if (f.buffet && !d.buffet) return false;
    if (f.maxKm != null && d.km > f.maxKm) return false;
    if (f.budget != null && d.real > f.budget) return false;
    if (f.freshMin != null && d.createdMin > f.freshMin) return false;
    return true;
  });
}

/* ============================================================ INSTRUMENTATION ============================================================ */
window.GENO_EVENTS = [];
function logEvent(type, payload) {
  const evt = Object.assign({ type: type, at: new Date().toISOString() }, payload || {});
  window.GENO_EVENTS.push(evt);
  if (window.console && console.debug) console.debug('[geno]', type, payload || '');
  // Same events, now durable, so the admin panel can count them.
  if (window.GenotiTrack) window.GenotiTrack.event(type, payload || {});
}

/* ============================================================ SESSION MEMORY ============================================================ */
const session = { area: null, filters: {}, lastResults: [], lastQueryText: '' };
window.GENO_SESSION = session;   // debug/inspection handle (see also window.GENO_EVENTS)

/* ============================================================ CHAT PRIMITIVES ============================================================ */
const chat = document.getElementById('chat');
let isBusy = false;
let interacted = false;   // suppress the auto-scroll on the very first (initial) render

function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
// The panel is elastic, so we scroll the page (not an inner box) to keep the newest content in view.
function scrollChat(){ if (!interacted) return; setTimeout(() => { const k = chat.lastElementChild; if (k) k.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 40); }

/* One result set at a time. Starting a new turn hides everything before it, so
   the fresh deals sit at the top of the panel instead of below the last search.
   Nothing is lost: "Show earlier" brings the history back. */
let hiddenTurns = 0;
function startNewTurn(){
  const prev = [...chat.children].filter(n => n.id !== 'gc-earlier' && !n.classList.contains('gc-past'));
  if (!prev.length) return;
  prev.forEach(n => n.classList.add('gc-past'));
  hiddenTurns++;
  let bar = document.getElementById('gc-earlier');
  if (!bar){
    bar = document.createElement('button');
    bar.id = 'gc-earlier';
    bar.className = 'gc-earlier';
    bar.onclick = showEarlier;
    chat.prepend(bar);
  }
  bar.textContent = `Show earlier (${hiddenTurns})`;
  bar.style.display = 'block';
  const panel = document.querySelector('.gc-panel');
  if (panel) setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 30);
}
function showEarlier(){
  chat.querySelectorAll('.gc-past').forEach(n => n.classList.remove('gc-past'));
  hiddenTurns = 0;
  const b = document.getElementById('gc-earlier');
  if (b) b.style.display = 'none';
}

function addUser(text){
  interacted = true;
  startNewTurn();
  const d = document.createElement('div'); d.className = 'msg msg-user';
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(d); scrollChat();
}
function addBot(html, extra){
  const d = document.createElement('div'); d.className = 'msg msg-bot';
  d.innerHTML = `<div class="msg-av">G</div><div class="bubble">${html}</div>`;
  chat.appendChild(d);
  if (extra){ const e = document.createElement('div'); e.className = 'msg-cards'; e.innerHTML = extra; chat.appendChild(e); }
  scrollChat();
}
function addCards(html){ const e = document.createElement('div'); e.className = 'msg'; e.style.marginLeft = '36px'; e.innerHTML = html; chat.appendChild(e); scrollChat(); }
function showTyping(){ isBusy = true; const d = document.createElement('div'); d.className='typing'; d.id='typing'; d.innerHTML=`<div class="msg-av">G</div><div class="dots"><span></span><span></span><span></span></div>`; chat.appendChild(d); scrollChat(); }
function hideTyping(){ isBusy = false; const t = document.getElementById('typing'); if (t) t.remove(); }

/* ============================================================ RENDERERS ============================================================ */
function trustMarkup(t){
  if (t.kind === 'merchant')
    return `<div class="dc-trust merchant"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Merchant guaranteed</div>`;
  if (t.kind === 'community')
    return `<div class="dc-trust community"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Community verified · ${t.votes} votes</div>`;
  return `<div class="dc-trust checked"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 2v20M2 12h20"/></svg> Price-checked · ${esc(t.cmp)}</div>`;
}

function dealCard(d){
  const tm = TYPE_META[d.type];
  const priceLine = `<span class="dc-real">${d.real === 0 ? 'Free' : '₹'+d.real.toLocaleString('en-IN')}</span>` +
    (d.ref != null ? ` <span class="dc-ref">₹${d.ref.toLocaleString('en-IN')}</span>` : '');
  const countdown = d.expMin != null
    ? ` · <span class="dc-countdown" data-exp="${NOW + d.expMin*60000}">ends in ${d.expMin}m</span>` : '';
  return `<div class="deal-card" data-id="${d.id}">
    <div class="dc-top">
      <div><div class="dc-name">${esc(d.merchant)}</div><div class="dc-meta">${esc(d.cat)} · ${d.km} km</div></div>
      <span class="dc-tag" style="background:${tm.tag[0]};color:${tm.tag[1]}">${tm.label}</span>
    </div>
    <div class="dc-offer">${esc(d.offer)}</div>
    <div class="dc-price">${priceLine}</div>
    <div class="dc-window">🕒 ${esc(d.window)}${countdown}</div>
    ${trustMarkup(d.trust)}
    ${d.tip ? `<div class="dc-tip">💳 ${esc(d.tip)}</div>` : ''}
    <div class="dc-actions">
      <button class="dc-book" onclick="bookDeal('${d.id}')">Book · Pay at store</button>
      <button class="dc-icon" onclick="voteDeal(this,'${d.id}')" title="Mark hot">🔥</button>
      <button class="dc-icon" onclick="shareDeal('${d.id}')" title="Share">↗</button>
    </div>
  </div>`;
}
function dealGrid(list){ return `<div class="deal-grid">${list.map(dealCard).join('')}</div>`; }

/* ============================================================ ENTRY STATES ============================================================ */
function setArea(area){
  session.area = area;
  session.filters.area = area;
  document.getElementById('gc-loc-name').textContent = area ? area + ', Bengaluru' : 'Set your area';
}

function initEntry(){
  // Deep link: ?deal=<id> means intent already expressed → open on that deal.
  const dealId = new URLSearchParams(location.search).get('deal');
  if (dealId && _DB.some(d => d.id === dealId)) { setArea('Koramangala'); return openDeepLink(dealId); }

  const ret = loadReturning();

  if (!('geolocation' in navigator)) { setArea(null); return askLocation("Your browser can't share location.", ret); }

  let settled = false;
  const finish = fn => { if (settled) return; settled = true; fn(); };
  const t = setTimeout(() => finish(() => askLocation('Location is taking a while.', ret)), 3500);

  navigator.geolocation.getCurrentPosition(
    () => finish(() => { clearTimeout(t); grantedFlow(ret); }),
    () => finish(() => { clearTimeout(t); askLocation("No problem, location wasn't shared.", ret); }),
    { timeout: 3000, maximumAge: 600000 }
  );
}

// Stub: a real build reverse-geocodes the coords. We resolve to a detected area.
function grantedFlow(ret){
  setArea('Koramangala');
  logEvent('entry', { mode: 'location-granted', area: session.area });
  if (ret) return renderReturning(ret);
  renderDigest();
}

function askLocation(reason, ret){
  logEvent('entry', { mode: 'location-denied' });
  addBot(`${timeGreeting()}! ${esc(reason)} Pick your area and I'll pull live deals around it.`);
  renderAreaPickerCard();
}

function openAreaPicker(){ addUser('Change location'); renderAreaPickerCard(); }
function renderAreaPickerCard(){
  const chips = AREAS.map(a => `<button class="chip" onclick="pickArea('${a}')">${a}</button>`).join('');
  addCards(`<div class="area-card">
    <div class="area-title">📍 Choose your area</div>
    <div class="area-sub">Bengaluru neighbourhoods with live deals right now.</div>
    <div class="chips">${chips}</div>
  </div>`);
}
function pickArea(area){
  addUser(area);
  setArea(area);
  logEvent('area-picked', { area });
  showTyping();
  setTimeout(() => { hideTyping(); renderDigest(); }, 450);
}

/* ---------- Returning user (localStorage stub) ---------- */
function loadReturning(){ try { const raw = localStorage.getItem('geno_last'); return raw ? JSON.parse(raw) : null; } catch { return null; } }
function saveReturning(obj){ try { localStorage.setItem('geno_last', JSON.stringify(obj)); } catch {} }
function renderReturning(ret){
  logEvent('entry', { mode: 'returning-user' });
  const live = _DB.find(d => d.merchant === ret.merchant);
  let msg = `Welcome back${ret.name ? ', <strong>'+esc(ret.name)+'</strong>' : ''}!`;
  if (ret.savedYear) msg += ` You've saved <strong>₹${Number(ret.savedYear).toLocaleString('en-IN')}</strong> this year.`;
  addBot(msg);
  if (live){ addBot(`Your spot <strong>${esc(live.merchant)}</strong> has a live deal today:`, dealGrid([live])); session.lastResults = [live]; startCountdowns(); }
  else renderDigest();
}

/* ============================================================ OPENING DIGEST ============================================================ */
function timeGreeting(){ const h = new Date().getHours(); return h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening'; }
function discount(d){ return d.ref ? Math.round((1 - d.real/d.ref) * 100) : 0; }

function renderDigest(){
  const area = session.area || 'your area';
  const all = fetchDeals({ area: session.area });
  const freshCount = fetchDeals({ area: session.area, freshMin: 60 }).length;

  if (all.length < 3){
    addBot(`${timeGreeting()}! It's quiet in <strong>${esc(area)}</strong> right now, only ${all.length} live deal${all.length===1?'':'s'}. I can ask nearby merchants to open one up for you.`);
    addCards(`<div class="empty-card"><div class="empty-actions">
      <button class="empty-btn primary" onclick="handleQuick('Negotiate a better price')"><span class="eb-ic">🤝</span> Ask a merchant to make me a deal</button>
      <button class="empty-btn" onclick="startNotify('deals near ' + ${JSON.stringify(area)})"><span class="eb-ic">🔔</span> Notify me when deals go live here</button>
    </div></div>`);
    return;
  }

  const order = ['off-peak','last-minute','community','flash','new-launch'];
  let lines = '';
  order.forEach(type => {
    const items = all.filter(d => d.type === type);
    if (!items.length) return;
    const best = items.slice().sort((a,b) => discount(b) - discount(a))[0];
    const tm = TYPE_META[type];
    lines += `<button class="dg-card" onclick="handleQuick('${tm.label} deals')" style="--dg-bg:${tm.tag[0]};--dg-fg:${tm.tag[1]}">
      <div class="dg-top">
        <span class="dg-n">${items.length}</span>
        <span class="dg-type">${esc(tm.label.toLowerCase())}</span>
      </div>
      <div class="dg-best">
        <div class="dg-merchant">${esc(best.merchant)}</div>
        <div class="dg-offer">${esc(best.offer)}</div>
      </div>
      <div class="dg-foot">best · ${best.km} km</div>
    </button>`;
  });

  addBot(`${timeGreeting()}! Here's what's live near <strong>${esc(area)}</strong>.`);
  addCards(`<div class="digest">
    <div class="digest-head"><b>${freshCount}</b> deal${freshCount===1?'':'s'} went live in the last hour</div>
    <div class="digest-sub">${all.length} live in total · tap a type to see it</div>
    <div class="dg-grid">${lines}</div>
  </div>
  <div class="chips-label">Browse by category</div>
  <div class="chips">
