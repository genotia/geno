<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Genoti Merchant</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --dark-green: #085041; --text: #111827;
      --muted: #6B7280; --border: #E5E7EB; --bg: #F9FAFB;
      --white: #fff; --red: #E53E3E;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; }

    /* ── NAV ── */
    nav { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -.5px; color: var(--text); text-decoration: none; flex-shrink: 0; }
    .logo span { color: var(--green); }
    .nav-center { display: flex; align-items: center; gap: 12px; }
    .merchant-chip { background: #D1FAE5; color: var(--dark-green); font-size: 13px; font-weight: 700; padding: 5px 12px; border-radius: 20px; }
    .role-chip { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .role-chip.admin { background: #FEF3C7; color: #92400E; }
    .role-chip.read  { background: #EFF6FF; color: #1E40AF; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .user-email { font-size: 13px; color: var(--muted); }
    .btn-logout { font-size: 13px; font-weight: 600; color: var(--muted); background: none; border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 14px; cursor: pointer; transition: border-color .15s, color .15s; }
    .btn-logout:hover { border-color: var(--text); color: var(--text); }

    /* ── MAIN ── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 26px; font-weight: 800; letter-spacing: -.5px; }
    .page-sub { font-size: 14px; color: var(--muted); margin-top: 2px; }
    .btn-add { background: var(--green); color: var(--white); border: none; border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; display: flex; align-items: center; gap: 6px; }
    .btn-add:hover { opacity: .88; }

    /* ── STATS ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .stat-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--text); margin-bottom: 2px; }
    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: #D97706; }
    .stat-label { font-size: 13px; color: var(--muted); font-weight: 500; }

    /* ── TABLE ── */
    .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .table-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .table-title { font-size: 16px; font-weight: 700; }
    .table-count { font-size: 13px; color: var(--muted); background: var(--bg); padding: 3px 10px; border-radius: 20px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 12px 16px; text-align: left; background: var(--bg); border-bottom: 1px solid var(--border); }
    td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr.paused td { opacity: .55; }
    tr:hover td { background: #FAFAFA; }
    .deal-emoji { font-size: 26px; width: 40px; }
    .deal-title { font-weight: 700; color: var(--text); }
    .deal-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .cat-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); white-space: nowrap; }
    .price-now { font-size: 15px; font-weight: 800; color: var(--text); }
    .price-was { font-size: 12px; color: #9CA3AF; text-decoration: line-through; }
    .disc-badge { display: inline-block; background: #FEE2E2; color: var(--red); font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; }
    .status-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
    .status-pill.live { background: #D1FAE5; color: var(--dark-green); }
    .status-pill.paused { background: #F3F4F6; color: var(--muted); }
    .action-btns { display: flex; gap: 6px; }
    .btn-toggle { font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--border); background: var(--white); color: var(--text); transition: all .15s; white-space: nowrap; }
    .btn-toggle:hover { border-color: var(--green); color: var(--green); }
    .btn-delete { font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 7px; cursor: pointer; border: 1.5px solid #FECACA; background: #FEF2F2; color: #DC2626; transition: all .15s; }
    .btn-delete:hover { background: #FEE2E2; }
    .empty-state { text-align: center; padding: 56px 24px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-sub { font-size: 14px; }

    /* ── LOADING ── */
    .loading-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px; }

    /* ── ADD DEAL MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 999; display: flex; align-items: center; justify-content: center;
      padding: 16px; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--white); border-radius: 20px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform .2s;
      box-shadow: 0 24px 64px rgba(0,0,0,.18);
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-head h2 { font-size: 18px; font-weight: 800; }
    .btn-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: var(--bg); cursor: pointer; font-size: 16px; color: var(--muted); display: flex; align-items: center; justify-content: center; }
    .btn-close:hover { background: var(--border); }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 18px; }
    .field-group { display: flex; flex-direction: column; gap: 6px; }
    .field-group label { font-size: 13px; font-weight: 600; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    input[type=text], input[type=number], select, textarea {
      padding: 10px 13px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      background: var(--white); outline: none; transition: border-color .15s;
      font-family: inherit; width: 100%;
    }
    input[type=text]:focus, input[type=number]:focus, select:focus { border-color: var(--green); }
    .hint { font-size: 11px; color: var(--muted); margin-top: -2px; }
    .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; }
    .swatch { width: 32px; height: 32px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all .15s; }
    .swatch.selected { border-color: var(--dark-green); transform: scale(1.15); }
    .modal-foot { padding: 0 24px 24px; display: flex; gap: 10px; }
    .btn-submit { flex: 1; background: var(--green); color: var(--white); border: none; border-radius: 10px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn-submit:hover { opacity: .88; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel { background: var(--white); color: var(--muted); border: 1.5px solid var(--border); border-radius: 10px; padding: 13px 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: border-color .15s; }
    .btn-cancel:hover { border-color: var(--text); }
    .form-err { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #DC2626; display: none; }
    .form-err.show { display: block; }

    input[type=date] {
      padding: 10px 13px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      background: var(--white); outline: none; transition: border-color .15s;
      font-family: inherit; width: 100%;
    }
    input[type=date]:focus { border-color: var(--green); }
    input[type=time] {
      padding: 10px 13px; border: 1.5px solid var(--border);
      border-radius: 10px; font-size: 14px; color: var(--text);
      background: var(--white); outline: none; transition: border-color .15s;
      font-family: inherit; flex: 1;
    }
    input[type=time]:focus { border-color: var(--green); }
    .slot-hint { font-size: 12px; color: var(--green); font-weight: 600; margin-top: 6px; min-height: 16px; }
    /* ── Day picker ── */
    .day-picker { display: flex; flex-direction: column; gap: 8px; }
    .day-quick { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
    .day-quick-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all .12s; }
    .day-quick-btn:hover { border-color: var(--green); color: var(--green); background: #F0FDF8; }
    .day-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .day-chip { width: 44px; height: 44px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--white); font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .12s; user-select: none; }
    .day-chip:hover { border-color: var(--green); color: var(--green); }
    .day-chip.selected { border-color: var(--green); background: #F0FDF8; color: var(--green); }
    .day-chip.weekend.selected { border-color: #8B5CF6; background: #F5F3FF; color: #7C3AED; }
    /* ── Dropdown time picker ── */
    .custom-time-row { display: flex; gap: 10px; margin-top: 4px; align-items: flex-end; }
    .time-sel-wrap { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .time-sel-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .time-sel-inner { position: relative; }
    select.time-sel {
      width: 100%; padding: 12px 36px 12px 14px;
      border: 1.5px solid var(--border); border-radius: 12px;
      background: var(--white); font-size: 15px; font-weight: 600;
      color: var(--text); appearance: none; -webkit-appearance: none;
      cursor: pointer; outline: none; transition: border-color .15s;
      font-family: inherit;
    }
    select.time-sel:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
    select.time-sel:invalid, select.time-sel option[value=""] { color: var(--muted); }
    .time-sel-arrow { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); font-size: 11px; }
    .time-sep { font-size: 20px; color: var(--border); flex-shrink: 0; padding-bottom: 12px; }
    .expiry-tag { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .exp-ok    { background: #D1FAE5; color: var(--dark-green); }
    .exp-soon  { background: #FEF3C7; color: #92400E; }
    .exp-today { background: #FED7AA; color: #92400E; }
    .exp-past  { background: #FEE2E2; color: #DC2626; }
    .btn-edit { font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--green); background: #F0FDF8; color: var(--green); transition: all .15s; white-space: nowrap; }
    .btn-edit:hover { background: #D1FAE5; }
    .slots-tag { display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: 6px; white-space: nowrap; }
    .slots-ok   { background: #D1FAE5; color: var(--dark-green); }
    .slots-low  { background: #FEF3C7; color: #92400E; }
    .slots-full { background: #FEE2E2; color: #DC2626; }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .stats-row { grid-template-columns: 1fr; }
      .nav-center { display: none; }
      .user-email { display: none; }
      th.hide-mobile, td.hide-mobile { display: none; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="nav-inner">
    <a href="../index.html" class="logo">✨ Genoti <span>AI</span></a>
    <div class="nav-center">
      <span class="merchant-chip" id="merchant-chip">🏪 —</span>
      <span class="role-chip" id="role-chip">—</span>
    </div>
    <div class="nav-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-logout" onclick="logout()">Log out</button>
    </div>
  </div>
</nav>

<!-- ── MAIN ── -->
<main>
  <div class="page-header">
    <div>
      <div class="page-title">Off-Peak Deals</div>
      <div class="page-sub" id="page-sub">Loading your deals…</div>
    </div>
    <button class="btn-add admin-only" style="display:none" onclick="openModal()">＋ Add Deal</button>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total deals</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green" id="stat-active">—</div>
      <div class="stat-label">Live now</div>
    </div>
    <div class="stat-card">
      <div class="stat-value orange" id="stat-paused">—</div>
      <div class="stat-label">Paused</div>
    </div>
  </div>

  <!-- Deals table -->
  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Your listings</span>
      <span class="table-count" id="table-count">0 deals</span>
    </div>
    <div id="table-wrap">
      <div class="loading-state">Loading deals…</div>
    </div>
  </div>
</main>

<!-- ── ADD DEAL MODAL ── -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Add Off-Peak Deal</h2>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <form id="deal-form" onsubmit="saveDeal(event)">
      <div class="modal-body">
        <div class="form-err" id="form-err"></div>

        <div class="field-group">
          <label>Deal title *</label>
          <input type="text" id="f-title" placeholder="e.g. 60-min Deep Tissue Massage" required />
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>Category *</label>
            <select id="f-category" required onchange="autoSetColor()">
              <option value="">Select category</option>
              <option value="Wellness &amp; Beauty">Wellness &amp; Beauty</option>
              <option value="Fitness &amp; Sports">Fitness &amp; Sports</option>
              <option value="Health &amp; Medical">Health &amp; Medical</option>
              <option value="Food &amp; Dining">Food &amp; Dining</option>
              <option value="Diagnostics">Diagnostics</option>
            </select>
          </div>
          <div class="field-group">
            <label>Emoji icon *</label>
            <input type="text" id="f-emoji" placeholder="e.g. 💆" maxlength="4" required />
          </div>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>Original price (₹) *</label>
            <input type="number" id="f-orig-price" placeholder="e.g. 1500" min="1" step="1" required />
          </div>
          <div class="field-group">
            <label>Discount % *</label>
            <input type="number" id="f-discount" placeholder="e.g. 50" min="1" max="99" step="1" required />
            <span class="hint" id="price-preview"></span>
          </div>
        </div>

        <div class="field-group">
          <label>Days available *</label>
          <div class="day-picker">
            <div class="day-quick">
              <button type="button" class="day-quick-btn" onclick="selectQuickDays('weekdays')">Weekdays</button>
              <button type="button" class="day-quick-btn" onclick="selectQuickDays('weekends')">Weekends</button>
              <button type="button" class="day-quick-btn" onclick="selectQuickDays('all')">Every day</button>
            </div>
            <div class="day-chips">
              <div class="day-chip selected" data-day="Mon" onclick="toggleDay(this)">Mon</div>
              <div class="day-chip selected" data-day="Tue" onclick="toggleDay(this)">Tue</div>
              <div class="day-chip selected" data-day="Wed" onclick="toggleDay(this)">Wed</div>
              <div class="day-chip selected" data-day="Thu" onclick="toggleDay(this)">Thu</div>
              <div class="day-chip selected" data-day="Fri" onclick="toggleDay(this)">Fri</div>
              <div class="day-chip weekend" data-day="Sat" onclick="toggleDay(this)">Sat</div>
              <div class="day-chip weekend" data-day="Sun" onclick="toggleDay(this)">Sun</div>
            </div>
          </div>
        </div>

        <div class="field-group">
          <label>Time slot *</label>
          <div class="custom-time-row" id="custom-time-row">
            <div class="time-sel-wrap">
              <div class="time-sel-label">From</div>
              <div class="time-sel-inner">
                <select class="time-sel" id="f-start-time" onchange="updateDuration()" required>
                  <option value="">— start —</option>
                </select>
                <span class="time-sel-arrow">▾</span>
              </div>
            </div>
            <div class="time-sep">→</div>
            <div class="time-sel-wrap">
              <div class="time-sel-label">To</div>
              <div class="time-sel-inner">
                <select class="time-sel" id="f-end-time" onchange="updateDuration()" required>
                  <option value="">— end —</option>
                </select>
                <span class="time-sel-arrow">▾</span>
              </div>
            </div>
          </div>
          <div class="slot-hint" id="slot-hint"></div>
        </div>

        <div class="field-group">
          <label>Deal expires on *</label>
          <input type="date" id="f-expires" required />
          <span class="hint">Deal auto-pauses after this date</span>
        </div>

        <div class="field-group">
          <label>Available slots *</label>
          <input type="number" id="f-capacity" placeholder="e.g. 5" min="1" step="1" required />
          <span class="hint">Max number of bookings you can accommodate in this slot</span>
        </div>

        <div class="field-group">
          <label>Card background colour</label>
          <div class="color-swatches" id="color-swatches">
            <div class="swatch selected" style="background:#FDF4FF" data-color="#FDF4FF" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#D1FAE5" data-color="#D1FAE5" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#DBEAFE" data-color="#DBEAFE" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#FEF3C7" data-color="#FEF3C7" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#FFF1F2" data-color="#FFF1F2" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#EDE9FE" data-color="#EDE9FE" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#F0FDF4" data-color="#F0FDF4" onclick="selectColor(this)"></div>
            <div class="swatch" style="background:#FFF7ED" data-color="#FFF7ED" onclick="selectColor(this)"></div>
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-submit" id="btn-submit">Add Deal →</button>

      </div>
    </form>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ijsxmgkzwvamwctbkgjo.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_fQfaGCU4jLbdUSCPM-pVjQ_oqK3UxkJ';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let currentMerchant = null;
  let currentRole = null;
  let selectedColor = '#FDF4FF';
  let editingId = null;
  let currentDeals = [];

  function fmt12(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    return (h % 12 || 12) + ':' + String(m).padStart(2, '0') + ' ' + ampm;
  }

  function fmtExpiry(dateStr) {
    if (!dateStr) return { label: '—', cls: '' };
    const today = new Date(); today.setHours(0,0,0,0);
    const exp   = new Date(dateStr + 'T00:00:00');
    const diff  = Math.round((exp - today) / 86400000);
    if (diff < 0)  return { label: 'Expired',       cls: 'exp-past' };
    if (diff === 0) return { label: 'Expires today', cls: 'exp-today' };
    if (diff <= 3)  return { label: `${diff}d left`, cls: 'exp-soon' };
    return {
      label: exp.toLocaleDateString('en-IN', { day:'numeric', month:'short' }),
      cls: 'exp-ok'
    };
  }

  const CATEGORY_COLORS = {
    'Wellness & Beauty': '#FDF4FF',
    'Fitness & Sports':  '#DBEAFE',
    'Health & Medical':  '#D1FAE5',
    'Food & Dining':     '#FEF3C7',
    'Diagnostics':       '#FFF1F2',
  };

  /* ── INIT ── */
  async function init() {
    const { data: { session } } = await db.auth.getSession();
    if (!session) { location.href = 'index.html'; return; }
    currentUser = session.user;

    // Get role + merchant
    const { data: mu, error } = await db
      .from('merchant_users')
      .select('role, merchants(id, name, slug)')
      .eq('user_id', currentUser.id)
      .single();

    if (error || !mu) { location.href = 'index.html'; return; }

    currentRole = mu.role;
    currentMerchant = mu.merchants;

    // Update nav
    document.getElementById('merchant-chip').textContent = '🏪 ' + currentMerchant.name;
    document.getElementById('user-email').textContent = currentUser.email;
    const roleEl = document.getElementById('role-chip');
    roleEl.textContent = currentRole === 'admin' ? '👑 Admin' : '👁 Read Only';
    roleEl.className = 'role-chip ' + currentRole;

    // Show admin-only elements
    if (currentRole === 'admin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }

    document.getElementById('page-sub').textContent =
      currentMerchant.name + ' · ' + (currentRole === 'admin' ? 'Admin access' : 'Read-only access');

    buildTimeOptions();
    await loadDeals();
  }

  /* ── LOAD DEALS ── */
  async function loadDeals() {
    const { data: deals, error } = await db
      .from('deals')
      .select('*')
      .eq('merchant_id', currentMerchant.id)
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('table-wrap').innerHTML =
        '<div class="loading-state">Error loading deals. Please refresh.</div>';
      return;
    }
    renderTable(deals);
  }

  /* ── RENDER TABLE ── */
  function renderTable(deals) {
    currentDeals = deals;
    const total  = deals.length;
    const active = deals.filter(d => d.active).length;
    const paused = total - active;

    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-paused').textContent = paused;
    document.getElementById('table-count').textContent = total + (total === 1 ? ' deal' : ' deals');

    if (total === 0) {
      document.getElementById('table-wrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <div class="empty-title">No deals yet</div>
          <div class="empty-sub">${currentRole === 'admin'
            ? 'Click "Add Deal" above to list your first off-peak offer.'
            : 'No deals have been added yet.'}</div>
        </div>`;
      return;
    }

    const adminCols = currentRole === 'admin' ? '<th>Actions</th>' : '';

    const rows = deals.map(d => {
      const discPrice  = Math.round(d.original_price * (1 - d.discount_pct / 100));
      const timeLabel  = d.start_time && d.end_time
        ? fmt12(d.start_time) + ' – ' + fmt12(d.end_time)
        : (d.time_slot || '—');
      const exp        = fmtExpiry(d.expires_at);
      const cap        = d.capacity || 0;
      const booked     = d.booked   || 0;
      const left       = cap - booked;
      const slotsCls   = left <= 0 ? 'slots-full' : left <= 2 ? 'slots-low' : 'slots-ok';
      const slotsLabel = cap === 0 ? '—'
        : left <= 0 ? `Full · ${booked}/${cap}`
        : `${left} left · ${booked}/${cap}`;

      const adminCells = currentRole === 'admin' ? `
        <td>
          <div class="action-btns">
            <button class="btn-edit" onclick="editDeal('${d.id}')">Edit</button>
            <button class="btn-toggle" onclick="toggleDeal('${d.id}', ${!d.active})">
              ${d.active ? 'Pause' : 'Activate'}
            </button>
            <button class="btn-delete" onclick="deleteDeal('${d.id}')">Delete</button>
          </div>
        </td>` : '';

      return `
        <tr class="${d.active ? '' : 'paused'}">
          <td class="deal-emoji">${d.emoji}</td>
          <td>
            <div class="deal-title">${d.title}</div>
            <div class="deal-time">${timeLabel}</div>
            <div class="deal-time" style="margin-top:1px;font-size:11px;opacity:.75">${d.days || ''}</div>
          </td>
          <td class="hide-mobile"><span class="cat-tag">${d.category}</span></td>
          <td>
            <div class="price-now">₹${discPrice.toLocaleString('en-IN')}</div>
            <div class="price-was">₹${Number(d.original_price).toLocaleString('en-IN')}</div>
          </td>
          <td class="hide-mobile"><span class="disc-badge">${d.discount_pct}% OFF</span></td>
          <td class="hide-mobile"><span class="slots-tag ${slotsCls}">${slotsLabel}</span></td>
          <td class="hide-mobile"><span class="expiry-tag ${exp.cls}">${exp.label}</span></td>
          <td>
            <span class="status-pill ${d.active ? 'live' : 'paused'}">
              ${d.active ? '● Live' : '○ Paused'}
            </span>
          </td>
          ${adminCells}
        </tr>`;
    }).join('');

    document.getElementById('table-wrap').innerHTML = `
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Deal</th>
            <th class="hide-mobile">Category</th>
            <th>Price</th>
            <th class="hide-mobile">Discount</th>
            <th class="hide-mobile">Slots</th>
            <th class="hide-mobile">Expires</th>
            <th>Status</th>
            ${adminCols}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  /* ── TOGGLE ACTIVE ── */
  async function toggleDeal(id, newActive) {
    const { error } = await db.from('deals').update({ active: newActive }).eq('id', id);
    if (!error) await loadDeals();
  }

  /* ── DELETE ── */
  async function deleteDeal(id) {
    if (!confirm('Delete this deal? This cannot be undone.')) return;
    const { error } = await db.from('deals').delete().eq('id', id);
    if (!error) await loadDeals();
  }

  /* ── DROPDOWN TIME PICKER ── */
  function buildTimeOptions() {
    ['f-start-time', 'f-end-time'].forEach(id => {
      const sel = document.getElementById(id);
      const cur = sel.value;
      while (sel.options.length > 1) sel.remove(1);
      for (let h = 6; h <= 22; h++) {
        for (const m of [0, 30]) {
          if (h === 22 && m === 30) break;
          const val = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
          const opt = new Option(fmt12(val), val);
          if (val === cur) opt.selected = true;
          sel.add(opt);
        }
      }
    });
  }

  function updateDuration() {
    const sv   = document.getElementById('f-start-time').value;
    const ev   = document.getElementById('f-end-time').value;
    const hint = document.getElementById('slot-hint');
    if (!sv || !ev) { hint.textContent = ''; hint.style.color = ''; return; }
    const mins = (parseInt(ev) * 60 + parseInt(ev.split(':')[1])) -
                 (parseInt(sv) * 60 + parseInt(sv.split(':')[1]));
    const [sh, sm] = sv.split(':').map(Number);
    const [eh, em] = ev.split(':').map(Number);
    const diff = (eh * 60 + em) - (sh * 60 + sm);
    if (diff <= 0) {
      hint.style.color = '#DC2626';
      hint.textContent = 'End time must be after start time';
      return;
    }
    const hrs = Math.floor(diff / 60), rem = diff % 60;
    hint.style.color = 'var(--green)';
    hint.textContent = '✓ ' + fmt12(sv) + ' – ' + fmt12(ev) + '  ·  '
      + (hrs ? hrs + ' hr' + (hrs > 1 ? 's' : '') + ' ' : '')
      + (rem ? rem + ' min' : '');
  }

  /* ── DAY PICKER ── */
  function toggleDay(el) {
    el.classList.toggle('selected');
  }

  function selectQuickDays(preset) {
    document.querySelectorAll('.day-chip').forEach(d => {
      const isWeekday = ['Mon','Tue','Wed','Thu','Fri'].includes(d.dataset.day);
      const isWeekend = ['Sat','Sun'].includes(d.dataset.day);
      if (preset === 'weekdays')      d.classList.toggle('selected', isWeekday);
      else if (preset === 'weekends') d.classList.toggle('selected', isWeekend);
      else                            d.classList.add('selected');
    });
  }

  function getSelectedDays() {
    return Array.from(document.querySelectorAll('.day-chip.selected')).map(d => d.dataset.day).join(',');
  }

  function setSelectedDays(daysStr) {
    const active = daysStr ? daysStr.split(',') : [];
    document.querySelectorAll('.day-chip').forEach(d => {
      d.classList.toggle('selected', active.includes(d.dataset.day));
    });
  }

  function preselectTimeSlot(startTime, endTime) {
    document.getElementById('f-start-time').value = startTime || '';
    document.getElementById('f-end-time').value   = endTime   || '';
    updateDuration();
  }

  /* ── SAVE DEAL (add or edit) ── */
  async function saveDeal(e) {
    e.preventDefault();
    const btn   = document.getElementById('btn-submit');
    const errEl = document.getElementById('form-err');
    btn.disabled = true;
    btn.textContent = editingId ? 'Saving…' : 'Adding…';
    errEl.classList.remove('show');

    const startTime = document.getElementById('f-start-time').value;
    const endTime   = document.getElementById('f-end-time').value;

    const selectedDays = getSelectedDays();
    if (!startTime || !endTime) {
      errEl.textContent = 'Please set a time slot.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = editingId ? 'Save Changes →' : 'Add Deal →';
      return;
    }
    if (!selectedDays) {
      errEl.textContent = 'Please select at least one day.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = editingId ? 'Save Changes →' : 'Add Deal →';
      return;
    }
    const payload = {
      merchant_id:    currentMerchant.id,
      merchant_name:  currentMerchant.name,
      title:          document.getElementById('f-title').value.trim(),
      category:       document.getElementById('f-category').value,
      emoji:          document.getElementById('f-emoji').value.trim(),
      bg_color:       selectedColor,
      original_price: parseFloat(document.getElementById('f-orig-price').value),
      discount_pct:   parseInt(document.getElementById('f-discount').value),
      start_time:     startTime,
      end_time:       endTime,
      time_slot:      fmt12(startTime) + ' – ' + fmt12(endTime),
      days:           selectedDays,
      expires_at:     document.getElementById('f-expires').value,
      capacity:       parseInt(document.getElementById('f-capacity').value) || 0,
    };

    let error;
    if (editingId) {
      const { merchant_id, merchant_name, ...updatePayload } = payload;
      ({ error } = await db.from('deals').update(updatePayload).eq('id', editingId));
    } else {
      payload.active = true;
      payload.booked = 0;
      ({ error } = await db.from('deals').insert(payload));
    }

    if (error) {
      errEl.textContent = 'Error: ' + error.message;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = editingId ? 'Save Changes →' : 'Add Deal →';
    } else {
      closeModal();
      await loadDeals();
    }
  }

  /* ── EDIT DEAL ── */
  function editDeal(id) {
    const deal = currentDeals.find(d => d.id === id);
    if (deal) openModal(deal);
  }

  /* ── MODAL ── */
  function resetForm() {
    document.getElementById('deal-form').reset();
    document.getElementById('price-preview').textContent = '';
    document.getElementById('slot-hint').textContent = '';
    setSelectedDays('Mon,Tue,Wed,Thu,Fri');
    buildTimeOptions();
    document.getElementById('f-start-time').value = '';
    document.getElementById('f-end-time').value   = '';
    selectedColor = '#FDF4FF';
    document.querySelectorAll('.swatch').forEach((s, i) => s.classList.toggle('selected', i === 0));
    document.getElementById('btn-submit').textContent = 'Add Deal →';
    editingId = null;
  }

  function openModal(deal = null) {
    editingId = deal ? deal.id : null;
    document.getElementById('modal-title').textContent   = deal ? 'Edit Deal' : 'Add Off-Peak Deal';
    document.getElementById('btn-submit').textContent    = deal ? 'Save Changes →' : 'Add Deal →';
    document.getElementById('form-err').classList.remove('show');

    if (deal) {
      document.getElementById('f-title').value      = deal.title;
      document.getElementById('f-category').value   = deal.category;
      document.getElementById('f-emoji').value      = deal.emoji;
      document.getElementById('f-orig-price').value = deal.original_price;
      document.getElementById('f-discount').value   = deal.discount_pct;
      preselectTimeSlot(deal.start_time || '', deal.end_time || '');
      setSelectedDays(deal.days || 'Mon,Tue,Wed,Thu,Fri,Sat,Sun');
      document.getElementById('f-expires').value    = deal.expires_at || '';
      document.getElementById('f-capacity').value   = deal.capacity   || '';
      const swatch = document.querySelector(`.swatch[data-color="${deal.bg_color}"]`);
      if (swatch) selectColor(swatch); else selectedColor = deal.bg_color;
      updatePricePreview();
    } else {
      resetForm();
      const d = new Date(); d.setDate(d.getDate() + 7);
      document.getElementById('f-expires').value = d.toISOString().split('T')[0];
    }
    document.getElementById('f-expires').min = new Date().toISOString().split('T')[0];
    document.getElementById('modal-overlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    resetForm();
  }
  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  /* ── COLOR SWATCH ── */
  function selectColor(el) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    selectedColor = el.dataset.color;
  }

  /* ── AUTO BG FROM CATEGORY ── */
  function autoSetColor() {
    const cat = document.getElementById('f-category').value;
    const color = CATEGORY_COLORS[cat];
    if (color) {
      const target = document.querySelector(`.swatch[data-color="${color}"]`);
      if (target) selectColor(target);
    }
  }

  /* ── PRICE PREVIEW ── */
  function updatePricePreview() {
    const orig = parseFloat(document.getElementById('f-orig-price').value);
    const disc = parseInt(document.getElementById('f-discount').value);
    const el   = document.getElementById('price-preview');
    if (orig > 0 && disc > 0 && disc < 100) {
      const final = Math.round(orig * (1 - disc / 100));
      el.textContent = `→ ₹${final.toLocaleString('en-IN')} after discount`;
    } else {
      el.textContent = '';
    }
  }
  document.getElementById('f-orig-price').addEventListener('input', updatePricePreview);
  document.getElementById('f-discount').addEventListener('input', updatePricePreview);

  /* ── LOGOUT ── */
  async function logout() {
    await db.auth.signOut();
    location.href = 'index.html';
  }

  init();
</script>
</body>
</html>
