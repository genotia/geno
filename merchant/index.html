<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merchant Login — Genoti AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1D9E75; --dark-green: #085041; --text: #111827;
      --muted: #6B7280; --border: #E5E7EB; --bg: #F9FAFB;
      --white: #fff; --red: #E53E3E;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 24px;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 20px; padding: 40px 40px 36px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 32px rgba(0,0,0,.07);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -.5px; color: var(--text); text-decoration: none; display: block; }
    .logo span { color: var(--green); }
    .logo-sub { font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: .2px; display: block; margin-top: 2px; margin-bottom: 28px; }
    .portal-badge { display: inline-flex; align-items: center; gap: 5px; background: #D1FAE5; color: var(--dark-green); font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; letter-spacing: .3px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
    .sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 14px; color: var(--text); background: var(--white);
      outline: none; transition: border-color .15s; margin-bottom: 16px;
    }
    input:focus { border-color: var(--green); }
    .btn-sign-in {
      width: 100%; background: var(--green); color: var(--white);
      border: none; border-radius: 10px; padding: 13px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s; margin-top: 4px;
    }
    .btn-sign-in:hover { opacity: .88; }
    .btn-sign-in:disabled { opacity: .5; cursor: not-allowed; }
    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 8px; padding: 10px 12px;
      font-size: 13px; color: #DC2626; margin-bottom: 16px; display: none;
    }
    .error-box.show { display: block; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0 20px; }
    .footer-note { font-size: 12px; color: var(--muted); text-align: center; }
    .footer-note a { color: var(--green); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <a href="../index.html" class="logo">✨ Genoti <span>AI</span></a>
    <span class="logo-sub">Discover, Book here, Save more</span>

    <div class="portal-badge">🏪 Merchant Portal</div>

    <h1>Sign in</h1>
    <p class="sub">Manage your off-peak deals from one place.</p>

    <div class="error-box" id="error-box"></div>

    <form onsubmit="login(event)">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />

      <button type="submit" class="btn-sign-in" id="btn-sign-in">Sign in →</button>
    </form>

    <hr class="divider" />
    <p class="footer-note">Need access? Contact <a href="mailto:admin@genoti.ai">admin@genoti.ai</a></p>
  </div>

  <script>
    const SUPABASE_URL = 'https://ijsxmgkzwvamwctbkgjo.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_fQfaGCU4jLbdUSCPM-pVjQ_oqK3UxkJ';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redirect if already authenticated
    db.auth.getSession().then(({ data }) => {
      if (data.session) location.href = 'dashboard.html';
    });

    async function login(e) {
      e.preventDefault();
      const btn = document.getElementById('btn-sign-in');
      const errEl = document.getElementById('error-box');

      btn.disabled = true;
      btn.textContent = 'Signing in…';
      errEl.classList.remove('show');

      const { error } = await db.auth.signInWithPassword({
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
      });

      if (error) {
        errEl.textContent = error.message === 'Invalid login credentials'
          ? 'Incorrect email or password. Please try again.'
          : error.message;
        errEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in →';
      } else {
        location.href = 'dashboard.html';
      }
    }
  </script>
</body>
</html>
